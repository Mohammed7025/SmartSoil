name: smart_soil_app
description: Smart Agriculture Mobile App connected to Firebase and FastAPI.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  firebase_database: ^10.5.0
  
  # State Management
  provider: ^6.1.1
  
  # HTTP
  http: ^1.1.2

  # Generative AI
  google_generative_ai: ^0.2.0

  # UI/UX Enhancements
  google_fonts: ^6.1.0
  percent_indicator: ^4.2.3
  flutter_animate: ^4.5.0
  intl: ^0.20.2
  fl_chart: ^0.66.0
  cupertino_icons: ^1.0.2 # UI/UX
  flutter_typeahead: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  flutter_localizations:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true
