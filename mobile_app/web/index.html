<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <!-- Preconnect to Firebase to speed up connection -->
  <link rel="preconnect" href="https://soilanalysis123-default-rtdb.asia-southeast1.firebasedatabase.app">
  <link rel="preconnect" href="https://firestore.googleapis.com">
  <link rel="preconnect" href="https://www.googleapis.com">

  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="smart_soil_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>smart_soil_app</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      background-color: #ffffff;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .loading-container {
      text-align: center;
    }

    .logo-icon {
      font-size: 80px;
      color: #4CAF50;
      margin-bottom: 20px;
      display: inline-block;
    }

    .app-title {
      font-size: 28px;
      font-weight: bold;
      color: #2E7D32;
      margin-bottom: 8px;
    }

    .app-subtitle {
      font-size: 14px;
      color: #757575;
      margin-bottom: 30px;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #4CAF50;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="loading-container">
    <!-- Simple unicode leaf or just a div representation if icon font not loaded yet -->
    <div class="logo-icon">&#127807;</div> <!-- 🌿 -->
    <div class="app-title">Smart Soil</div>
    <div class="app-subtitle">AI Agriculture Advisor</div>
    <div class="spinner"></div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
